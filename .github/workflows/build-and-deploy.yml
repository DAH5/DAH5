name: Build and Deploy Static Website

concurrency:
  group: static-site-deploy
  cancel-in-progress: true

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KATAPULT_OBJECT_STORAGE_REGION: uk-lon-1
      KATAPULT_OBJECT_STORAGE_HOSTNAME: uk-lon-1.katapultobjects.com
      KATAPULT_OBJECT_STORAGE_BUCKET_NAME: dah5
      CLOUDFLARE_PAGES_PROJECT_NAME: dah5
      OUTPUT_DIRECTORY: public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Run StaticPHP build
        run: php StaticPHP-Launcher.php
      
      - name: Install s3cmd
        run: sudo apt-get install -y s3cmd

      - name: Configure s3cmd for Krystal Cloud Object Storage
        run: |
          cat > ~/.mime.types <<EOF
          text/html       html htm
          text/css        css
          application/javascript js
          application/json json
          image/svg+xml   svg
          EOF

          cat > ~/.s3cfg <<EOF
          [default]
          access_key = ${{ secrets.KATAPULT_ACCESS_KEY }}
          secret_key = ${{ secrets.KATAPULT_SECRET_KEY }}
          host_base = ${{ env.KATAPULT_OBJECT_STORAGE_HOSTNAME }}
          host_bucket = %(bucket)s.${{ env.KATAPULT_OBJECT_STORAGE_HOSTNAME }}
          bucket_location = ${{ env.KATAPULT_OBJECT_STORAGE_REGION }}
          signature_v2 = True
          use_https = True
          mime_types = /home/runner/.mime.types
          EOF

      - name: Deploy Site to Krystal Cloud Object Storage
        run: |
          s3cmd sync "${{ env.OUTPUT_DIRECTORY }}/" "s3://$KATAPULT_OBJECT_STORAGE_BUCKET_NAME/" \
            --delete-removed \
            --acl-public \
            --guess-mime-type \
            --no-mime-magic
      
      - name: Fix Mime Type Mismatches on Krystal Cloud Object Storage
        run: |
          s3cmd modify \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --include "*.htm" \
            --add-header="Content-Type:text/html" \
            "s3://$KATAPULT_OBJECT_STORAGE_BUCKET_NAME/"
          s3cmd modify \
            --recursive \
            --exclude "*" \
            --include "*.css" \
            --add-header="Content-Type:text/css" \
            "s3://$KATAPULT_OBJECT_STORAGE_BUCKET_NAME/"
          s3cmd modify \
            --recursive \
            --exclude "*" \
            --include "*.js" \
            --add-header="Content-Type:application/javascript" \
            "s3://$KATAPULT_OBJECT_STORAGE_BUCKET_NAME/"
          s3cmd modify \
            --recursive \
            --exclude "*" \
            --include "*.json" \
            --add-header="Content-Type:application/json" \
            "s3://$KATAPULT_OBJECT_STORAGE_BUCKET_NAME/"
          s3cmd modify \
            --recursive \
            --exclude "*" \
            --include "*.svg" \
            --add-header="Content-Type:image/svg+xml" \
            "s3://$KATAPULT_OBJECT_STORAGE_BUCKET_NAME/"

      - name: Deploy Site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.OUTPUT_DIRECTORY }} --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
